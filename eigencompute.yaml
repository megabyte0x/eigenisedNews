name: eigenised-news
version: 0.1.0
image: eigenised-news:dev
runtime:
  vcpu: 4
  memoryMiB: 8192
endpoints:
  - name: synthesize
    method: POST
    path: /synthesize
  - name: healthz
    method: GET
    path: /healthz
appWallet:
  bindEnv:
    privateKey: AGENT_PRIVATE_KEY
    address: AGENT_ID
