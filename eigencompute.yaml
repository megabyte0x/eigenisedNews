name: eigenised-news
version: 0.1.0
image: eigenised-news:dev
runtime:
  vcpu: 4
  memoryMiB: 8192
endpoints:
  - name: paid-research
    method: POST
    path: /api/research
  - name: research
    method: POST
    path: /research
  - name: research-queue
    method: POST
    path: /research/jobs
  - name: research-queue-list
    method: GET
    path: /research/jobs
  - name: synthesize
    method: POST
    path: /synthesize
  - name: openapi
    method: GET
    path: /openapi.json
  - name: x402-discovery
    method: GET
    path: /.well-known/x402
  - name: verify
    method: GET
    path: /verify
  - name: skill
    method: GET
    path: /skill.md
  - name: healthz
    method: GET
    path: /healthz
appWallet:
  bindEnv:
    privateKey: AGENT_PRIVATE_KEY
    address: AGENT_ID
